name: TB2 Benchmark
run-name: TB2 Benchmark | ${{ github.event.inputs.model_name }}

on:
  workflow_dispatch:
    inputs:
      model_name:
        description: provider/model for KODE bench runner
        required: true
      task_names:
        description: Optional comma-separated task names or glob patterns. Leave empty to run the full dataset.
        required: false
        default: ""
      task_limit:
        description: Deterministic cap on the number of selected tasks. Leave empty or 0 for the full task set.
        required: false
        default: "0"
      shard_count:
        description: Number of shards to split the dataset into
        required: false
        default: "25"
      max_parallel_shards:
        description: Maximum number of shard jobs to run concurrently
        required: false
        default: "4"
      n_attempts:
        description: Attempts per task
        required: false
        default: "1"
      n_concurrent:
        description: Concurrent trials within each shard
        required: false
        default: "2"
      provider_retry_max_attempts:
        description: Max provider retry attempts for transient API failures
        required: false
        default: "8"
      provider_retry_initial_delay_ms:
        description: Initial provider retry delay in milliseconds
        required: false
        default: "4000"
      provider_retry_max_delay_ms:
        description: Maximum provider retry delay in milliseconds
        required: false
        default: "60000"
      provider_retry_backoff_multiplier:
        description: Exponential backoff multiplier for provider retries
        required: false
        default: "2"
      harbor_ref:
        description: Harbor git ref to clone at runtime
        required: false
        default: main
      timeout_multiplier:
        description: Harbor timeout multiplier
        required: false
        default: "1.0"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      task_count: ${{ steps.matrix.outputs.task_count }}
      shard_count: ${{ steps.matrix.outputs.shard_count }}
    env:
      DATASET_NAME: terminal-bench
      DATASET_VERSION: "2.0"
      TASK_NAMES: ${{ github.event.inputs.task_names || '' }}
      TASK_LIMIT: ${{ github.event.inputs.task_limit || '0' }}
      SHARD_COUNT: ${{ github.event.inputs.shard_count || '25' }}
      HARBOR_REF: ${{ github.event.inputs.harbor_ref || 'main' }}

    steps:
      - uses: actions/checkout@v4

      - name: Clone Harbor
        run: |
          HARBOR_DIR="$(bash scripts/bench/setup-harbor.sh)"
          echo "HARBOR_DIR=$HARBOR_DIR" >> "$GITHUB_ENV"

      - name: Build shard matrix
        id: matrix
        run: |
          mkdir -p .bench
          python3 scripts/bench/make-harbor-task-shards.py \
            --registry-path "$HARBOR_DIR/registry.json" \
            --dataset-name "$DATASET_NAME" \
            --dataset-version "$DATASET_VERSION" \
            --shard-count "$SHARD_COUNT" \
            --task-names "$TASK_NAMES" \
            --task-limit "$TASK_LIMIT" \
            --matrix-output .bench/tb2-shards.json \
            --manifest-output .bench/tb2-task-manifest.json
          echo "matrix=$(jq -c . < .bench/tb2-shards.json)" >> "$GITHUB_OUTPUT"
          echo "task_count=$(jq -r '.task_count' .bench/tb2-task-manifest.json)" >> "$GITHUB_OUTPUT"
          echo "shard_count=$(jq -r '.shard_count' .bench/tb2-task-manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Summarize shard plan
        run: |
          echo "## TB2 Sharding Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dataset: \`$DATASET_NAME@$DATASET_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Task limit: $TASK_LIMIT" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tasks: $(jq -r '.task_count' .bench/tb2-task-manifest.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Shards: $(jq -r '.shard_count' .bench/tb2-task-manifest.json)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload shard manifest
        uses: actions/upload-artifact@v4
        with:
          name: tb2-task-manifest-${{ github.run_id }}-${{ github.run_attempt }}
          path: .bench/tb2-task-manifest.json

  tb2-benchmark:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(github.event.inputs.max_parallel_shards || '4') }}
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    env:
      MODEL_NAME: ${{ github.event.inputs.model_name || vars.BENCH_MODEL_NAME }}
      DATASET_NAME: terminal-bench
      TASK_NAMES: ${{ matrix.task_names }}
      N_ATTEMPTS: ${{ github.event.inputs.n_attempts || '1' }}
      N_CONCURRENT: ${{ github.event.inputs.n_concurrent || '2' }}
      DATASET_VERSION: "2.0"
      HARBOR_REF: ${{ github.event.inputs.harbor_ref || 'main' }}
      TIMEOUT_MULTIPLIER: ${{ github.event.inputs.timeout_multiplier || '1.0' }}
      KODE_BENCH_RETRY_MAX_ATTEMPTS: ${{ github.event.inputs.provider_retry_max_attempts || '8' }}
      KODE_BENCH_RETRY_INITIAL_DELAY_MS: ${{ github.event.inputs.provider_retry_initial_delay_ms || '4000' }}
      KODE_BENCH_RETRY_MAX_DELAY_MS: ${{ github.event.inputs.provider_retry_max_delay_ms || '60000' }}
      KODE_BENCH_RETRY_BACKOFF_MULTIPLIER: ${{ github.event.inputs.provider_retry_backoff_multiplier || '2' }}
      KODE_BENCH_RETRY_JITTER_RATIO: "0.2"
      RUN_ID: tb2-${{ github.run_id }}-${{ matrix.shard_label }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      OPENAI_API: ${{ vars.OPENAI_API }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_BASE_URL: ${{ vars.GEMINI_BASE_URL }}
      MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
      MINIMAX_BASE_URL: ${{ vars.MINIMAX_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Harbor
        run: python -m pip install "harbor"

      - name: Install KODE dependencies
        run: npm ci

      - name: Run TB2 benchmark shard
        run: bash scripts/bench/run-harbor-benchmark.sh

      - name: Summarize shard outputs
        if: always()
        shell: bash
        run: |
          shopt -s nullglob
          echo "## Shard ${{ matrix.shard_label }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tasks in shard: ${{ matrix.task_count }}" >> "$GITHUB_STEP_SUMMARY"
          for result in benchmark-runs/harbor/*/result.json; do
            echo "### $(dirname "$result")" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$result" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done
          for result in benchmark-runs/harbor/*/*/result.json; do
            echo "#### $(dirname "$result")" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat "$result" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tb2-benchmark-${{ github.run_id }}-${{ github.run_attempt }}-shard-${{ matrix.shard_label }}
          path: |
            benchmark-runs/harbor
            .bench

  aggregate:
    if: always()
    needs:
      - prepare
      - tb2-benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tb2-benchmark-${{ github.run_id }}-${{ github.run_attempt }}-shard-*

      - name: Merge shard results
        run: |
          mkdir -p .bench
          EXPECTED_RESULTS=$(( ${{ needs.prepare.outputs.task_count }} * ${{ github.event.inputs.n_attempts || '1' }} ))
          python3 scripts/bench/merge-harbor-results.py \
            --artifacts-dir artifacts \
            --output .bench/tb2-merged-results.json \
            --summary-output .bench/tb2-merged-summary.md \
            --details-output .bench/tb2-merged-test-details.json \
            --expected-shards "${{ needs.prepare.outputs.shard_count }}" \
            --expected-results "$EXPECTED_RESULTS"

      - name: Publish merged summary
        if: always()
        run: |
          cat .bench/tb2-merged-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload merged artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tb2-benchmark-merged-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .bench/tb2-merged-results.json
            .bench/tb2-merged-test-details.json
            .bench/tb2-merged-summary.md
