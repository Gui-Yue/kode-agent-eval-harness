name: eval-tb2-official

on:
  workflow_dispatch:
    inputs:
      runtime_ref:
        description: "Runtime-under-test ref (empty uses repo var EVAL_RUNTIME_REF, default kode-agent-sdk)"
        required: false
        default: ""
      tb2_runner:
        description: "Override tb2 runner: auto|harbor|uvx|docker (empty uses repo var EVAL_TB2_RUNNER)"
        required: false
        default: ""
      tb2_dataset:
        description: "Override TB2 dataset (empty uses repo var EVAL_TB2_DATASET)"
        required: false
        default: ""
      solve_timeout_ms:
        description: "Override vehicle solve timeout in ms (empty uses repo var EVAL_SOLVE_TIMEOUT_MS)"
        required: false
        default: ""
      tb2_agent:
        description: "Optional fallback to official Harbor agent when runtime_ref is empty"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "src/**"
      - "agents/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/eval-tb2.yml"
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

concurrency:
  group: eval-tb2-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eval:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.RUN_EVAL_TB2 == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      EVAL_RUNTIME_REF: ${{ vars.EVAL_RUNTIME_REF }}
      EVAL_TB2_DATASET: ${{ vars.EVAL_TB2_DATASET }}
      EVAL_TB2_AGENT: ${{ vars.EVAL_TB2_AGENT }}
      EVAL_TB2_RUNNER: ${{ vars.EVAL_TB2_RUNNER }}
      EVAL_TB2_HARBOR_VERSION: ${{ vars.EVAL_TB2_HARBOR_VERSION }}
      EVAL_TB2_LITELLM_VERSION: ${{ vars.EVAL_TB2_LITELLM_VERSION }}
      EVAL_SOLVE_TIMEOUT_MS: ${{ vars.EVAL_SOLVE_TIMEOUT_MS }}
      EVAL_TB2_PYTHON: ${{ vars.EVAL_TB2_PYTHON }}
      EVAL_TB2_DOCKER_IMAGE: ${{ vars.EVAL_TB2_DOCKER_IMAGE }}
      BENCHMARK_MODEL: ${{ vars.EVAL_MODEL }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      BENCHMARK_DOCKER_PROXY: ${{ vars.BENCHMARK_DOCKER_PROXY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: npm ci

      - name: Check Docker
        run: docker info

      - name: Install Kode runtime SDK when needed
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_REF_INPUT="${{ github.event.inputs.runtime_ref }}"
          RUNTIME_REF="${RUNTIME_REF_INPUT:-${EVAL_RUNTIME_REF:-${EVAL_AGENT_CORE:-kode-agent-sdk}}}"
          if [[ -n "$RUNTIME_REF" ]]; then
            case "$RUNTIME_REF" in
              kode-agent-sdk|kode-sdk|kode-agent|agents/default.json|agents/kode-agent-sdk.json)
                npm install --no-save @shareai-lab/kode-sdk
                ;;
            esac
          fi

      - name: Install pinned Harbor runner
        shell: bash
        run: |
          set -euo pipefail
          HARBOR_VERSION="${EVAL_TB2_HARBOR_VERSION:-0.1.45}"
          LITELLM_VERSION="${EVAL_TB2_LITELLM_VERSION:-1.80.8}"
          PIP_INDEX_URL="https://pypi.org/simple"
          python -m pip install --index-url "$PIP_INDEX_URL" --upgrade pip setuptools wheel
          python -m pip install --index-url "$PIP_INDEX_URL" "litellm==${LITELLM_VERSION}" "harbor==${HARBOR_VERSION}"
          harbor --version

      - name: Run TB2 official evaluation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports tests/tmp/jobs

          MODEL="${BENCHMARK_MODEL:-openai/glm-5}"
          RUNTIME_REF_INPUT="${{ github.event.inputs.runtime_ref }}"
          TB2_AGENT_INPUT="${{ github.event.inputs.tb2_agent }}"
          TB2_DATASET_INPUT="${{ github.event.inputs.tb2_dataset }}"
          TB2_RUNNER_INPUT="${{ github.event.inputs.tb2_runner }}"
          SOLVE_TIMEOUT_INPUT="${{ github.event.inputs.solve_timeout_ms }}"

          RUNTIME_REF="${RUNTIME_REF_INPUT:-${EVAL_RUNTIME_REF:-${EVAL_AGENT_CORE:-kode-agent-sdk}}}"
          TB2_AGENT="${TB2_AGENT_INPUT:-${EVAL_TB2_AGENT:-oracle}}"
          TB2_DATASET="${TB2_DATASET_INPUT:-${EVAL_TB2_DATASET:-terminal-bench@2.0}}"
          TB2_RUNNER="${TB2_RUNNER_INPUT:-${EVAL_TB2_RUNNER:-harbor}}"
          SOLVE_TIMEOUT="${SOLVE_TIMEOUT_INPUT:-${EVAL_SOLVE_TIMEOUT_MS:-}}"
          TB2_PYTHON="${EVAL_TB2_PYTHON:-3.13}"
          TB2_DOCKER_IMAGE="${EVAL_TB2_DOCKER_IMAGE:-ghcr.io/astral-sh/uv:python3.13-bookworm}"
          if [[ "$SOLVE_TIMEOUT" =~ ^[0-9]+$ ]] && [[ "$SOLVE_TIMEOUT" -gt 0 ]]; then
            export EVAL_HARNESS_SOLVE_TIMEOUT_MS="$SOLVE_TIMEOUT"
          fi

          CMD=(npm run run -- --benchmark=tb2 --model="$MODEL" --tb2-dataset="$TB2_DATASET" --tb2-runner="$TB2_RUNNER" --tb2-python="$TB2_PYTHON" --tb2-docker-image="$TB2_DOCKER_IMAGE" --tb2-jobs-dir=tests/tmp/jobs --out=reports/tb2-official.json)
          if [[ -n "$RUNTIME_REF" ]]; then
            CMD+=(--agent="$RUNTIME_REF")
          else
            CMD+=(--tb2-agent="$TB2_AGENT")
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tb2-eval-${{ github.run_id }}
          path: |
            reports/tb2-official.json
            tests/tmp/jobs
          if-no-files-found: warn
