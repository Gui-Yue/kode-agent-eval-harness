name: eval-swe-official

on:
  workflow_dispatch:
    inputs:
      runtime_ref:
        description: "Runtime-under-test ref (empty uses repo var EVAL_RUNTIME_REF, default kode-agent-sdk)"
        required: false
        default: ""
      max_instances:
        description: "Override SWE max instances (empty uses repo var EVAL_SWE_MAX_INSTANCES)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "src/**"
      - "agents/**"
      - "benchmarks-data/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/eval-swe.yml"
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: eval-swe-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eval:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.RUN_EVAL_SWE == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      EVAL_RUNTIME_REF: ${{ vars.EVAL_RUNTIME_REF }}
      EVAL_AGENT_CORE: ${{ vars.EVAL_AGENT_CORE }}
      EVAL_SWE_MAX_INSTANCES: ${{ vars.EVAL_SWE_MAX_INSTANCES }}
      BENCHMARK_PROVIDER: ${{ vars.EVAL_PROVIDER }}
      BENCHMARK_MODEL: ${{ vars.EVAL_MODEL }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      BENCHMARK_DOCKER_PROXY: ${{ vars.BENCHMARK_DOCKER_PROXY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Docker
        run: docker info

      - name: Install Kode runtime SDK when needed
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_REF_INPUT="${{ github.event.inputs.runtime_ref }}"
          RUNTIME_REF="${RUNTIME_REF_INPUT:-${EVAL_RUNTIME_REF:-kode-agent-sdk}}"
          case "$RUNTIME_REF" in
            kode-agent-sdk|kode-sdk|kode-agent|agents/default.json|agents/kode-agent-sdk.json)
              npm install --no-save @shareai-lab/kode-sdk
              ;;
          esac

      - name: Run SWE official evaluation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports tests/tmp

          RUNTIME_REF_INPUT="${{ github.event.inputs.runtime_ref }}"
          RUNTIME_REF="${RUNTIME_REF_INPUT:-${EVAL_RUNTIME_REF:-kode-agent-sdk}}"
          MODEL="${BENCHMARK_MODEL:-openai/glm-5}"
          MAX="${{ github.event.inputs.max_instances }}"
          if [[ -z "$MAX" ]]; then
            MAX="${EVAL_SWE_MAX_INSTANCES:-0}"
          fi

          CMD=(npm run run -- --benchmark=swe --agent="$RUNTIME_REF" --model="$MODEL" --swe-auto-generate=true --out=reports/swe-official.json)
          if [[ "$MAX" =~ ^[0-9]+$ ]] && [[ "$MAX" -gt 0 ]]; then
            CMD+=(--swe-max-instances="$MAX")
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swe-eval-${{ github.run_id }}
          path: |
            reports/swe-official.json
            tests/tmp/swe-predictions.generated.json
          if-no-files-found: warn
