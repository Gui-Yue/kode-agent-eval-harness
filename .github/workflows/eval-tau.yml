name: eval-tau-official

on:
  workflow_dispatch:
    inputs:
      runtime_ref:
        description: "Runtime-under-test ref (empty uses repo var EVAL_RUNTIME_REF, default kode-agent-sdk)"
        required: false
        default: ""
      domain:
        description: "Override TAU domain (empty uses repo var EVAL_TAU_DOMAIN, default airline)"
        required: false
        default: ""
      num_trials:
        description: "Override TAU num-trials (empty uses repo var EVAL_TAU_NUM_TRIALS, default 1)"
        required: false
        default: ""
      agent_core:
        description: "Optional fallback to official TAU agent core when runtime_ref is empty"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "src/**"
      - "agents/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/eval-tau.yml"
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

concurrency:
  group: eval-tau-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eval:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.RUN_EVAL_TAU == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      EVAL_RUNTIME_REF: ${{ vars.EVAL_RUNTIME_REF }}
      EVAL_TAU_DOMAIN: ${{ vars.EVAL_TAU_DOMAIN }}
      EVAL_TAU_NUM_TRIALS: ${{ vars.EVAL_TAU_NUM_TRIALS }}
      EVAL_TAU_AGENT_CORE: ${{ vars.EVAL_TAU_AGENT_CORE }}
      EVAL_AGENT_CORE: ${{ vars.EVAL_AGENT_CORE }}
      BENCHMARK_PROVIDER: ${{ vars.EVAL_PROVIDER }}
      BENCHMARK_MODEL: ${{ vars.EVAL_MODEL }}
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
      BENCHMARK_DOCKER_PROXY: ${{ vars.BENCHMARK_DOCKER_PROXY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: npm ci

      - name: Install Kode runtime SDK when needed
        shell: bash
        run: |
          set -euo pipefail
          RUNTIME_REF_INPUT="${{ github.event.inputs.runtime_ref }}"
          RUNTIME_REF="${RUNTIME_REF_INPUT:-${EVAL_RUNTIME_REF:-${EVAL_AGENT_CORE:-kode-agent-sdk}}}"
          if [[ -n "$RUNTIME_REF" ]]; then
            case "$RUNTIME_REF" in
              kode-agent-sdk|kode-sdk|kode-agent|agents/default.json|agents/kode-agent-sdk.json)
                npm install --no-save @shareai-lab/kode-sdk
                ;;
            esac
          fi

      - name: Run TAU official evaluation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports tests/tmp

          PROVIDER="${BENCHMARK_PROVIDER:-openai}"
          MODEL="${BENCHMARK_MODEL:-openai/glm-5}"

          RUNTIME_REF_INPUT="${{ github.event.inputs.runtime_ref }}"
          DOMAIN_INPUT="${{ github.event.inputs.domain }}"
          TRIALS_INPUT="${{ github.event.inputs.num_trials }}"
          AGENT_CORE_INPUT="${{ github.event.inputs.agent_core }}"

          RUNTIME_REF="${RUNTIME_REF_INPUT:-${EVAL_RUNTIME_REF:-${EVAL_AGENT_CORE:-kode-agent-sdk}}}"
          DOMAIN="${DOMAIN_INPUT:-${EVAL_TAU_DOMAIN:-airline}}"
          TRIALS="${TRIALS_INPUT:-${EVAL_TAU_NUM_TRIALS:-1}}"
          AGENT_CORE="${AGENT_CORE_INPUT:-${EVAL_TAU_AGENT_CORE:-llm_agent}}"

          if [[ -n "$RUNTIME_REF" ]]; then
            CMD=(npm run run -- --benchmark=tau --agent="$RUNTIME_REF" --provider="$PROVIDER" --model="$MODEL" --tau-domain="$DOMAIN" --num-trials="$TRIALS" --tau-data-dir=tests/tmp/tau2-data --out=reports/tau-official.json)
          else
            CMD=(npm run run -- --benchmark=tau --provider="$PROVIDER" --model="$MODEL" --tau-domain="$DOMAIN" --tau-agent-core="$AGENT_CORE" --num-trials="$TRIALS" --tau-data-dir=tests/tmp/tau2-data --out=reports/tau-official.json)
          fi

          echo "Running: ${CMD[*]}"
          "${CMD[@]}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tau-eval-${{ github.run_id }}
          path: |
            reports/tau-official.json
            tests/tmp/tau2-data/simulations
          if-no-files-found: warn
